services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: claw-timescaledb
    restart: unless-stopped
    environment:
      POSTGRES_DB: claw
      POSTGRES_USER: claw
      POSTGRES_PASSWORD: claw
    ports:
      - "5432:5432"
    volumes:
      - timescale-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claw -d claw"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - claw-net

  data-aggregator:
    # 对外映射 18080，避免与宿主机其它服务占用 8080 冲突；容器内服务监听 8080。
    build:
      context: .
      dockerfile: Dockerfile
    container_name: claw-data-aggregator
    restart: unless-stopped
    depends_on:
      timescaledb:
        condition: service_healthy
    environment:
      # 监听 0.0.0.0 以便宿主机端口映射（如 18080:8080）可访问 /healthz
      DATA_AGGREGATOR_SERVER_ADDRESS: "0.0.0.0"
      DATA_AGGREGATOR_DATABASE_HOST: timescaledb
      DATA_AGGREGATOR_DATABASE_PORT: 5432
      DATA_AGGREGATOR_DATABASE_USER: claw
      DATA_AGGREGATOR_DATABASE_PASSWORD: claw
      DATA_AGGREGATOR_DATABASE_NAME: claw
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    # 与 server-relay（8080）错开，本机访问: http://127.0.0.1:18080
    ports:
      - "18080:8080"
    networks:
      - claw-net

volumes:
  timescale-data:

networks:
  claw-net:
    driver: bridge
