          name: version
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        "200":
          description: Version payload
          content:
            application/json:
              schema: { $ref: "#/components/schemas/StrategyVersion" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

