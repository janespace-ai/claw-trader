  # --- New: strategy versions -----------------------------------------------

  /api/strategies/{id}/versions:
    get:
      operationId: listStrategyVersions
      summary: List all versions of a strategy (newest first)
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Paginated versions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Pagination"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/StrategyVersion" }
    post:
      operationId: createStrategyVersion
