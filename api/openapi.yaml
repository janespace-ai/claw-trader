openapi: 3.1.0
info:
  title: Claw Trader backend API
  version: 1.0.0
  description: |
    Contract between `desktop-client` (consumer) and `service-api`
    (producer). Frozen canonical shapes; backend alignment is tracked
    as follow-up work. See `api/README.md` for workflow and
    `api/errors.md` for the error-code dictionary.
  contact:
    name: claw-trader
    url: https://github.com/janespace-ai/claw-trader

servers:
  - url: http://localhost:8081
    description: Local service-api (default)
  - url: http://{host}:{port}
    description: Custom
    variables:
      host:
        default: localhost
      port:
        default: "8081"

# -----------------------------------------------------------------------------
# Cross-cutting components. Operations (paths) come in subsequent task groups.
# -----------------------------------------------------------------------------
components:
  schemas:

    # --- Task envelope ------------------------------------------------------

    TaskStatus:
      type: string
      enum: [pending, running, done, failed, cancelled]
      description: Canonical lifecycle state for any long-running server task.

    TaskProgress:
      type: object
      description: >
        Optional progress hint on a running task. Phase values are
        operation-specific (e.g. "sweep", "synthesize", "sandbox",
        "aggregate", "backtest", "fetch", "llm").
      properties:
        phase:
          type: string
        done:
          type: integer
          minimum: 0
        total:
          type: integer
          minimum: 0

    TaskResponse:
      type: object
      description: >
        Canonical envelope for every long-running operation. `result`
        is present only when `status === "done"`; `error` only when
        `status === "failed"`. Concrete operations narrow `result` via
        `allOf` + per-operation schema.
      required: [task_id, status, started_at]
      properties:
        task_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/TaskStatus"
        progress:
          $ref: "#/components/schemas/TaskProgress"
        result:
          description: Operation-specific result; narrowed by concrete endpoint.
        error:
          $ref: "#/components/schemas/ErrorBody"
        started_at:
          type: integer
          description: Unix seconds when the task was accepted.
        finished_at:
          type: integer
          nullable: true
          description: Unix seconds when the task reached a terminal state.

    # --- Error envelope -----------------------------------------------------

    ErrorCode:
      type: string
      description: |
        Predefined error-code dictionary (see `api/errors.md`). Keep
        additions conservative — removing a code is breaking; adding
        is safe.
      enum:
        - INVALID_INTERVAL
        - INVALID_SYMBOL
        - INVALID_RANGE
        - SYMBOL_NOT_FOUND
        - STRATEGY_NOT_FOUND
        - STRATEGY_VERSION_NOT_FOUND
        - BACKTEST_NOT_FOUND
        - SCREENER_NOT_FOUND
        - TASK_NOT_FOUND
        - COMPLIANCE_FAILED
        - AI_REJECTED
        - AI_REVIEW_UNAVAILABLE
        - SANDBOX_ERROR
        - SANDBOX_TIMEOUT
        - DATA_UNAVAILABLE
        - RATE_LIMITED
        - UPSTREAM_UNREACHABLE
        - INTERNAL_ERROR
        - PARAM_GRID_TOO_LARGE
        - LLM_PROVIDER_FAILED
        - LLM_BUDGET_EXCEEDED

    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
          description: Human-readable; not the identifier. Use `code` for branching.
        details:
          type: object
          additionalProperties: true
          description: Code-specific payload. See errors.md for per-code keys.

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          $ref: "#/components/schemas/ErrorBody"

    # --- Pagination ---------------------------------------------------------

    Pagination:
      type: object
      description: >
        Opaque cursor-based pagination envelope. Server encodes an
        internal cursor as base64 JSON; clients treat it as a string.
      required: [next_cursor]
      properties:
        next_cursor:
          type: string
          nullable: true

    # --- Shared market-data types ------------------------------------------

    Interval:
      type: string
      enum: [5m, 15m, 30m, 1h, 4h, 1d]

    Market:
      type: string
      enum: [futures]

    Kline:
      type: object
      required: [ts, o, h, l, c, v]
      properties:
        ts:
          type: integer
          description: Unix seconds at the open of the bar.
        o:
          type: number
        h:
          type: number
        l:
          type: number
        c:
          type: number
        v:
          type: number
        qv:
          type: number
          nullable: true
          description: Quote volume (USDT). Null when unavailable.

    Symbol:
      type: object
      required: [symbol, market, status]
      properties:
        symbol:
          type: string
        market:
          $ref: "#/components/schemas/Market"
        rank:
          type: integer
          nullable: true
        volume_24h_quote:
          type: number
          nullable: true
        status:
          type: string
          enum: [active, inactive]
        updated_at:
          type: integer
          description: Unix seconds.

    Gap:
      type: object
      required: [symbol, market, interval, gap_from, gap_to, missing_bars, status]
      properties:
        id:
          type: integer
        symbol:
          type: string
        market:
          $ref: "#/components/schemas/Market"
        interval:
          $ref: "#/components/schemas/Interval"
        gap_from:
          type: integer
          description: Unix seconds.
        gap_to:
          type: integer
          description: Unix seconds.
        missing_bars:
          type: integer
        status:
          type: string
          enum: [detected, repairing, repaired, unrecoverable, skipped]
        retry_count:
          type: integer
        error:
          type: string
          nullable: true

    # --- Strategy ----------------------------------------------------------

    Strategy:
      type: object
      required: [id, name, code, created_at, updated_at]
      description: |
        Stored user-submitted strategy.  After unified-strategy-workspace
        (migration 006) a strategy carries a workspace zone (chat-driven
        draft fields) plus a saved zone (snapshot taken when the user
        clicks 保存策略).  Legacy `code_type` is omitempty on new rows.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        code_type:
          type: string
          enum: [strategy, screener]
          description: Legacy discriminator; not set on rows created via the unified workspace.
        code:
          type: string
        params_schema:
          type: object
          additionalProperties: true
          nullable: true
        current_version:
          type: integer
          minimum: 1
          description: Latest version number (filled after `strategy-versions` capability lands).
        created_at:
          type: integer
        updated_at:
          type: integer

        # ---- workspace zone (mutates with chat) -----------------------
        draft_code:
          type: string
          nullable: true
          description: Latest in-flight strategy code from the chat workspace.
        draft_symbols:
          type: array
          items: { type: string }
          nullable: true
          description: Latest in-flight symbol universe.
        last_backtest:
          oneOf:
            - $ref: "#/components/schemas/LastBacktestSummary"
            - type: "null"

        # ---- saved zone (mutates only via /save) ----------------------
        saved_code:
          type: string
          nullable: true
        saved_symbols:
          type: array
          items: { type: string }
          nullable: true
        saved_at:
          type: integer
          nullable: true
          description: Unix seconds of the last 保存策略 action.  Null until first save.

        # ---- lifecycle ------------------------------------------------
        is_archived_draft:
          type: boolean
          default: false
          description: |
            True when the user pressed "+ 创建新策略" while this session was
            dirty.  Such rows still appear in the library under the
            "归档草稿" filter.

    LastBacktestSummary:
      type: object
      description: |
        Cached backtest summary stored on the strategy so re-opening it
        shows the most recent run without re-dispatching.  The summary
        payload is opaque on this surface (key:value of metric).
      required: [task_id, summary, ran_at]
      properties:
        task_id:
          type: string
          format: uuid
        summary:
          type: object
          additionalProperties: true
        ran_at:
          type: integer
          description: Unix seconds when the backtest finished.

    PatchStrategyDraftBody:
      type: object
      description: |
        Body of PATCH /api/strategies/{id}.  Workspace-zone only — saved
        fields are NOT touched by this endpoint.  Any omitted field
        leaves the corresponding column unchanged.
      properties:
        draft_code: { type: string }
        draft_symbols:
          type: array
          items: { type: string }
        last_backtest:
          $ref: "#/components/schemas/LastBacktestSummary"

    SaveStrategyBody:
      type: object
      description: |
        Body of POST /api/strategies/{id}/save.  `name` is optional;
        sent on the FIRST save (when strategy.name is null and the user
        just typed one in the save dialog).
      properties:
        name: { type: string }

    # --- Backtest -----------------------------------------------------------

    BacktestConfig:
      type: object
      required: [symbols, interval, from, to]
      properties:
        symbols:
          type: array
          items: { type: string }
          minItems: 1
          maxItems: 50
        interval:
          $ref: "#/components/schemas/Interval"
        from:
          type: integer
          description: Unix seconds.
        to:
          type: integer
          description: Unix seconds.
        initial_capital:
          type: number
          description: Optional. Backend defaults to 10000 when omitted.
        commission:
          type: number
          description: Optional. Backend defaults to 0.0006.
        slippage:
          type: number
          description: Optional. Backend defaults to 0.0001.

    MetricsBlock:
      type: object
      description: Summary metrics derived from an equity curve.
      properties:
        total_return: { type: number, nullable: true }
        sharpe: { type: number, nullable: true }
        max_drawdown: { type: number, nullable: true }
        win_rate: { type: number, nullable: true }
        profit_factor: { type: number, nullable: true }
        avg_trade: { type: number, nullable: true }
        total_trades: { type: integer }

    EquityPoint:
      type: object
      required: [ts, value]
      properties:
        ts: { type: integer, description: Unix seconds }
        value: { type: number }

    Trade:
      type: object
      required: [id, symbol, side, entry_ts, entry_price]
      properties:
        id: { type: string }
        symbol: { type: string }
        side: { type: string, enum: [long, short] }
        entry_ts: { type: integer }
        entry_price: { type: number }
        exit_ts: { type: integer, nullable: true }
        exit_price: { type: number, nullable: true }
        pnl_pct: { type: number, nullable: true }
        duration_hours: { type: number, nullable: true }

    BacktestResult:
      type: object
      description: |
        Result payload for a done backtest task. The current contract
        describes the single-mode shape. Multi-symbol + preview/deep
        extensions live in the follow-up `api-contract-new-capabilities`.
      properties:
        metrics:
          $ref: "#/components/schemas/MetricsBlock"
        equity_curve:
          type: array
          items: { $ref: "#/components/schemas/EquityPoint" }
        trades:
          type: array
          items: { $ref: "#/components/schemas/Trade" }

    BacktestHistoryItem:
      type: object
      required: [id, status, started_at]
      properties:
        id: { type: string, format: uuid }
        strategy_id: { type: string, format: uuid, nullable: true }
        status: { $ref: "#/components/schemas/TaskStatus" }
        mode: { type: string, default: "single" }
        started_at: { type: integer }
        finished_at: { type: integer, nullable: true }
        summary_return: { type: number, nullable: true }

    # --- Screener ----------------------------------------------------------

    ScreenerRowResult:
      type: object
      required: [symbol, passed, score]
      properties:
        symbol: { type: string }
        passed: { type: boolean }
        score: { type: number }
        rank: { type: integer, nullable: true }
        volume_24h_quote: { type: number, nullable: true }

    ScreenerResult:
      type: object
      required: [results]
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/ScreenerRowResult" }

    # --- New capability schemas (api-contract-new-capabilities) ---------

    BacktestMode:
      type: string
      enum: [preview, deep]
      description: Mode drives default lookback (preview=7d, deep=180d).

    MonthlyPoint:
      type: object
      required: [month, return_pct]
      properties:
        month: { type: string, description: "YYYY-MM" }
        return_pct: { type: number }

    Signal:
      type: object
      required: [signal_id, symbol, ts, kind]
      properties:
        signal_id: { type: string }
        symbol: { type: string }
        ts: { type: integer }
        kind: { type: string, enum: [long, short, flat] }
        indicators:
          type: object
          additionalProperties: { type: number }

    SymbolResult:
      type: object
      description: Per-symbol breakdown of a multi-symbol backtest.
      properties:
        metrics: { $ref: "#/components/schemas/MetricsBlockExtended" }
        equity_curve:
          type: array
          items: { $ref: "#/components/schemas/EquityPoint" }
        trades:
          type: array
          items: { $ref: "#/components/schemas/Trade" }
        signals:
          type: array
          items: { $ref: "#/components/schemas/Signal" }

    SummaryBlock:
      type: object
      description: Aggregated across symbols (equal-weighted).
      properties:
        metrics: { $ref: "#/components/schemas/MetricsBlockExtended" }
        equity_curve:
          type: array
          items: { $ref: "#/components/schemas/EquityPoint" }
        drawdown_curve:
          type: array
          items: { $ref: "#/components/schemas/EquityPoint" }
        monthly_returns:
          type: array
          items: { $ref: "#/components/schemas/MonthlyPoint" }

    MetricsBlockExtended:
      type: object
      description: Extended metrics superset used by Deep Backtest + OptimLens.
      properties:
        total_return: { type: number, nullable: true }
        sharpe: { type: number, nullable: true }
        sortino: { type: number, nullable: true }
        calmar: { type: number, nullable: true }
        profit_factor: { type: number, nullable: true }
        win_rate: { type: number, nullable: true }
        avg_trade: { type: number, nullable: true }
        avg_hours_in_trade: { type: number, nullable: true }
        positive_days_ratio: { type: number, nullable: true }
        max_drawdown: { type: number, nullable: true }
        total_trades: { type: integer }

    BacktestResultExtended:
      type: object
      description: |
        New multi-symbol + preview/deep backtest result shape. Replaces
        the single-mode `BacktestResult` for `startBacktest` + `getBacktestResult`.
      required: [summary, per_symbol]
      properties:
        summary: { $ref: "#/components/schemas/SummaryBlock" }
        per_symbol:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SymbolResult"

    # --- Strategy versions -----------------------------------------------

    StrategyVersion:
      type: object
      required: [strategy_id, version, code, created_at]
      properties:
        strategy_id: { type: string, format: uuid }
        version: { type: integer, minimum: 1 }
        code: { type: string }
        summary: { type: string, nullable: true }
        params_schema:
          type: object
          additionalProperties: true
          nullable: true
        parent_version:
          type: integer
          nullable: true
        created_at: { type: integer }

    # --- Analysis: OptimLens ---------------------------------------------

    OptimLensRequest:
      type: object
      required: [strategy_id, symbols, param_grid]
      properties:
        strategy_id: { type: string, format: uuid }
        symbols:
          type: array
          items: { type: string }
          minItems: 1
          maxItems: 50
        lookback_days: { type: integer }
        param_grid:
          type: object
          description: >
            Map of param-name → list of values. Server computes the
            cross-product; rejected with PARAM_GRID_TOO_LARGE if > 50.
          additionalProperties:
            type: array
            items: {}

    OptimLensImprovement:
      type: object
      required: [title, category, rationale]
      properties:
        title: { type: string }
        category:
          type: string
          enum: [entry, exit, params, filter, risk_mgmt]
        rationale: { type: string }
        expected_delta:
          type: object
          properties:
            sharpe: { type: number, nullable: true }
            max_drawdown: { type: number, nullable: true }
            win_rate: { type: number, nullable: true }
        suggested_change:
          type: object
          description: Either a param_update or a code_edit.
          properties:
            kind: { type: string, enum: [param_update, code_edit] }
            payload:
              type: object
              additionalProperties: true

    OptimLensResult:
      type: object
      required: [improvements]
      properties:
        base_metrics: { $ref: "#/components/schemas/MetricsBlockExtended" }
        grid_results:
          type: array
          description: Per-combo metrics (one row per sub-backtest that ran).
          items:
            type: object
            properties:
              combo:
                type: object
                additionalProperties: true
              metrics: { $ref: "#/components/schemas/MetricsBlockExtended" }
        improvements:
          type: array
          items: { $ref: "#/components/schemas/OptimLensImprovement" }

    # --- Analysis: SignalReview ------------------------------------------

    SignalReviewRequest:
      type: object
      required: [backtest_task_id]
      properties:
        backtest_task_id: { type: string, format: uuid }

    SignalVerdict:
      type: object
      required: [signal_id, symbol, entry_ts, verdict]
      properties:
        signal_id: { type: string }
        symbol: { type: string }
        entry_ts: { type: integer }
        verdict: { type: string, enum: [good, questionable, bad] }
        note: { type: string }

    SignalReviewResult:
      type: object
      required: [signals_total, verdicts, summary]
      properties:
        signals_total: { type: integer }
        verdicts:
          type: array
          items: { $ref: "#/components/schemas/SignalVerdict" }
        summary:
          type: object
          properties:
            good: { type: integer }
            questionable: { type: integer }
            bad: { type: integer }

    # --- Analysis: TradeExplain (synchronous) ----------------------------

    TradeExplainRequest:
      oneOf:
        - type: object
          required: [backtest_task_id, symbol, trade_id]
          properties:
            backtest_task_id: { type: string, format: uuid }
            symbol: { type: string }
            trade_id: { type: string }
        - type: object
          required: [trade, klines_context]
          properties:
            trade: { $ref: "#/components/schemas/Trade" }
            klines_context:
              type: array
              items: { $ref: "#/components/schemas/Kline" }

    TradeExplainResult:
      type: object
      required: [trade_id, narrative]
      properties:
        trade_id: { type: string }
        narrative: { type: string }
        entry_context:
          type: object
          properties:
            indicators:
              type: object
              additionalProperties: { type: number }
            regime: { type: string }
        exit_context:
          type: object
          properties:
            reason: { type: string }
            indicators:
              type: object
              additionalProperties: { type: number }

    # --- Engine status ---------------------------------------------------

    EngineStatus:
      type: object
      required: [version, supported_markets, supported_intervals, uptime_seconds, active_tasks]
      properties:
        version: { type: string }
        data_aggregator_version: { type: string, nullable: true }
        supported_markets:
          type: array
          items: { $ref: "#/components/schemas/Market" }
        supported_intervals:
          type: array
          items: { $ref: "#/components/schemas/Interval" }
        data_range:
          type: object
          nullable: true
          properties:
            from: { type: integer, nullable: true }
            to: { type: integer, nullable: true }
        last_aggregator_sync_at:
          type: integer
          nullable: true
        active_tasks: { type: integer }
        uptime_seconds: { type: integer }

    # --- Symbol metadata -------------------------------------------------

    SymbolMetadata:
      type: object
      required: [symbol, market, status]
      properties:
        symbol: { type: string }
        name: { type: string }
        market: { $ref: "#/components/schemas/Market" }
        rank: { type: integer, nullable: true }
        volume_24h_quote: { type: number, nullable: true }
        last_price: { type: number, nullable: true }
        change_24h_pct: { type: number, nullable: true }
        first_kline_at: { type: integer, nullable: true }
        last_kline_at: { type: integer, nullable: true }
        status: { type: string, enum: [active, inactive] }

# =============================================================================
# Paths
# =============================================================================
paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness probe
      responses:
        "200":
          description: Service reachable
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, example: ok }

  /api/klines:
    get:
      operationId: getKlines
      summary: Fetch K-lines for a symbol
      parameters:
        - in: query
          name: symbol
          required: true
          schema: { type: string }
        - in: query
          name: interval
          required: true
          schema: { $ref: "#/components/schemas/Interval" }
        - in: query
          name: from
          schema: { type: integer, description: "Unix seconds" }
        - in: query
          name: to
          schema: { type: integer, description: "Unix seconds" }
        - in: query
          name: market
          schema: { $ref: "#/components/schemas/Market" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 5000 }
      responses:
        "200":
          description: Ordered K-lines (ascending by ts)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Kline" }
        "400":
          description: Invalid parameters
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/symbols:
    get:
      operationId: listSymbols
      summary: List symbols (paginated)
      parameters:
        - in: query
          name: market
          schema: { $ref: "#/components/schemas/Market" }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 500, default: 100 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Paginated symbols
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Pagination"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Symbol" }

  /api/gaps:
    get:
      operationId: listGaps
      summary: List detected data gaps
      parameters:
        - in: query
          name: symbol
          schema: { type: string }
        - in: query
          name: interval
          schema: { $ref: "#/components/schemas/Interval" }
        - in: query
          name: status
          schema: { type: string }
      responses:
        "200":
          description: Matching gaps
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Gap" }

  /api/strategies:
    post:
      operationId: createStrategy
      summary: Create a strategy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, code_type, code]
              properties:
                name: { type: string }
                code_type: { type: string, enum: [strategy, screener] }
                code: { type: string }
                params_schema: { type: object, additionalProperties: true }
      responses:
        "200":
          description: Created
          content:
            application/json:
              schema:
                type: object
                required: [id, name]
                properties:
                  id: { type: string, format: uuid }
                  name: { type: string }
    get:
      operationId: listStrategies
      summary: List strategies (paginated)
      parameters:
        - in: query
          name: code_type
          schema: { type: string, enum: [strategy, screener] }
        - in: query
          name: limit
          schema: { type: integer, default: 50, maximum: 200 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Paginated strategies
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Pagination"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/Strategy" }

  /api/strategies/{id}:
    get:
      operationId: getStrategy
      summary: Get a strategy by id
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Strategy
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Strategy" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

    patch:
      operationId: patchStrategyDraft
      summary: Update workspace-draft fields of a strategy
      description: |
        Updates `draft_code`, `draft_symbols`, and/or `last_backtest`
        without touching the saved zone (`saved_code`, `saved_symbols`,
        `saved_at`).  The dedicated POST `/save` endpoint is the only
        way to mutate the saved fields — that separation guarantees
        chat-driven edits never accidentally clobber a deliberate save.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/PatchStrategyDraftBody" }
      responses:
        "200":
          description: Updated strategy (full envelope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Strategy" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/strategies/{id}/save:
    post:
      operationId: saveStrategy
      summary: Snapshot draft → saved
      description: |
        Atomically copies `draft_code` → `saved_code`, `draft_symbols` →
        `saved_symbols`, sets `saved_at = now()`, clears `is_archived_draft`,
        and (if `name` is supplied) updates the strategy name.  This is
        the ONLY endpoint that may mutate saved-zone fields.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SaveStrategyBody" }
      responses:
        "200":
          description: Updated strategy (full envelope)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Strategy" }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/strategies/{id}/archive_draft:
    post:
      operationId: archiveStrategyDraft
      summary: Mark a strategy session as an archived draft
      description: |
        Sets `is_archived_draft = true` so the row sinks to the
        "归档草稿" filter in the library tab.  Used by the desktop
        client when the user presses "+ 创建新策略" while the active
        session is dirty: the previous strategy is preserved as a
        recoverable draft instead of being silently lost.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Acknowledgement payload
          content:
            application/json:
              schema:
                type: object
                required: [id, is_archived_draft]
                properties:
                  id: { type: string, format: uuid }
                  is_archived_draft: { type: boolean }
        "404":
          description: Not found
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/backtest/start:
    post:
      operationId: startBacktest
      summary: Submit a backtest
      description: |
        Validates and dispatches a backtest job.  The code goes through
        two gates before execution:

          - Gate 1 (AST): forbidden-module/builtins check → 400 `COMPLIANCE_FAILED` on fail.
          - Gate 2 (AI review): DeepSeek security+correctness review → 403 `AI_REJECTED` on fail,
            503 `AI_REVIEW_UNAVAILABLE` when the reviewer is down.

        Rejections at either gate short-circuit: no row is written to `claw.backtest_runs`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, config]
              properties:
                code: { type: string }
                config: { $ref: "#/components/schemas/BacktestConfig" }
                strategy_id: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: Task accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskResponse" }
        "400":
          description: Validation error or Gate 1 (AST compliance) rejection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: |
            Gate 2 (AI review) rejected the submitted code.  `details`
            contains `{reason, model, dimensions: {security, correctness}}`.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: |
            Gate 2 is enabled but the AI reviewer is temporarily unavailable
            (no API key, network, upstream error).  Retry later.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/backtest/status/{task_id}:
    get:
      operationId: getBacktestStatus
      summary: Poll backtest status
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Status envelope
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskResponse" }

  /api/backtest/result/{task_id}:
    get:
      operationId: getBacktestResult
      summary: Fetch backtest result
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Full result (embedded when status=done)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TaskResponse"
                  - type: object
                    properties:
                      result: { $ref: "#/components/schemas/BacktestResult" }

  /api/backtest/history:
    get:
      operationId: listBacktestHistory
      summary: List past backtests (paginated)
      parameters:
        - in: query
          name: strategy_id
          schema: { type: string, format: uuid }
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: cursor
          schema: { type: string }
      responses:
        "200":
          description: Paginated history
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/Pagination"
                  - type: object
                    required: [items]
                    properties:
                      items:
                        type: array
                        items: { $ref: "#/components/schemas/BacktestHistoryItem" }

  /api/screener/start:
    post:
      operationId: startScreener
      summary: Run a screener
      description: |
        Symmetric to `/api/backtest/start`: Gate 1 (AST) + Gate 2 (AI review)
        both run before dispatch.  See that endpoint for rejection semantics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
                config:
                  type: object
                  properties:
                    market: { $ref: "#/components/schemas/Market" }
                    lookback_days: { type: integer, default: 365 }
                strategy_id: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: Task accepted
          content:
            application/json:
              schema: { $ref: "#/components/schemas/TaskResponse" }
        "400":
          description: Validation error or Gate 1 rejection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "403":
          description: Gate 2 (AI review) rejected the submitted code.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }
        "503":
          description: Gate 2 reviewer temporarily unavailable.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ErrorResponse" }

  /api/screener/result/{task_id}:
    get:
      operationId: getScreenerResult
      summary: Poll / fetch screener result
      parameters:
        - in: path
          name: task_id
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Task envelope (result present when done)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/TaskResponse"
                  - type: object
                    properties:
                      result: { $ref: "#/components/schemas/ScreenerResult" }

