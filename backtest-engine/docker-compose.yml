# Shares TimescaleDB with data-aggregator: start data-aggregator first (or `make db-up`)
# so networks `claw-net` / `claw-sandbox-net` and container `timescaledb` exist.
services:
  backtest-engine:
    build:
      context: .
      dockerfile: Dockerfile
    image: claw-backtest-engine:latest
    container_name: claw-backtest-engine
    restart: unless-stopped
    environment:
      BACKTEST_DATABASE_HOST: timescaledb
      BACKTEST_DATABASE_PORT: 5432
      BACKTEST_DATABASE_USER: claw
      BACKTEST_DATABASE_PASSWORD: claw
      BACKTEST_DATABASE_NAME: claw
      # readonly user must be created via migration; password below is what the sandbox will use
      BACKTEST_READONLY_USER: claw_readonly
      BACKTEST_READONLY_PASSWORD: claw_readonly
      BACKTEST_SANDBOX_IMAGE: claw-sandbox:latest
      BACKTEST_SANDBOX_NETWORK: claw-sandbox-net
      # Internal callback base URL — containers reach this host via the bridge network
      BACKTEST_CALLBACK_BASE: http://claw-backtest-engine:8081
    volumes:
      # Mount docker socket so the service can launch sandbox containers.
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8081:8081"
    networks:
      - claw-net
      - claw-sandbox-net

networks:
  claw-net:
    external: true
    name: claw-net
  claw-sandbox-net:
    external: true
    name: claw-sandbox-net
