server:
  address: "0.0.0.0"
  port: 8081

database:
  host: "localhost"
  port: 5432
  user: "claw"
  password: "claw"
  name: "claw"
  schema: "claw"
  max_conns: 10
  min_conns: 2

readonly:
  user: "claw_readonly"
  password: "claw_readonly"

# sandbox dispatch — all job execution happens inside the long-lived
# sandbox-service container (see ../sandbox-service/).  This engine only
# forwards /run requests and receives /internal/cb/{channel}/:task_id callbacks.
#
# Resource limits (memory / CPU / FSIZE) are now enforced inside sandbox-service
# via rlimits; configure them in sandbox-service/config.yaml, not here.
sandbox:
  service_url: "http://sandbox-service:8090"
  # URL sandbox-service workers POST progress/complete/error to (i.e. this engine).
  # Service name (NOT container_name) so it matches sandbox-service's allowlist.
  callback_base: "http://service-api:8081"
  # Per-request timeout for /run, /status, /healthz.  Small on purpose —
  # /run only enqueues, so any delay here means sandbox-service is unhealthy.
  timeout_sec: 10

# ai_review (Gate 2 — LLM code reviewer).  Disabled out-of-the-box; flip
# enabled=true once DEEPSEEK_API_KEY is set via env.
ai_review:
  enabled: false
  # api_key is NEVER committed to config.yaml — set DEEPSEEK_API_KEY in env
  # (or SERVICE_API_AI_REVIEW_API_KEY) and the loader picks it up at boot.
  api_key: ""
  base_url: "https://api.deepseek.com"
  model: "deepseek-reasoner"
  timeout_seconds: 30
  cache_ttl_days: 30
  prompt_version: "v1"

compliance:
  # Python modules explicitly allowed in user-submitted code.
  module_whitelist:
    - "numpy"
    - "pandas"
    # ta-lib is NOT installed in sandbox-service; users should use claw.indicators.
    # If you re-add ta-lib to the sandbox image, also re-add "talib" here.
    - "math"
    - "datetime"
    - "collections"
    - "typing"
    - "dataclasses"
    - "decimal"
    - "json"
    - "claw"
    - "claw.strategy"
    - "claw.screener"
  # Hard-banned builtins that indicate dangerous code.
  forbidden_builtins:
    - "exec"
    - "eval"
    - "compile"
    - "__import__"
    - "open"
    - "input"
  # Explicit module blocklist (overrides whitelist on conflict).
  forbidden_modules:
    - "os"
    - "sys"
    - "subprocess"
    - "socket"
    - "shutil"
    - "pathlib"
    - "importlib"
    - "ctypes"

backtest:
  max_optimization_runs: 100
  default_lookback_days: 180    # deep backtest default ~6 months
  preview_lookback_days: 7
